name: Lint

on:
  pull_request:
    paths:
      - '**.md'
      - '.github/workflows/lint.yml'

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Markdown Lint
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config-file: '.github/workflows/markdownlint-config.json'
